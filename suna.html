<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아니 캔버스: 서바이벌 (무한 역전 카오스 모드)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;900&display=swap');
        :root { --wall: #080808; --gold: #af9042; --text: #ffffff; --sub-text: #555; --btn-sub: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--wall); color: var(--text); font-family: 'Noto Serif KR', serif; }
        #main-wrapper { display: flex; flex-direction: row; width: 100%; min-height: 100vh; overflow-x: hidden; }
        
        #docent-panel { width: 280px; background: rgba(10,10,12,0.95); border-right: 1px solid #1a1a1a; padding: 25px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .gallery-title { font-size: 1.3rem; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 30px; letter-spacing: 3px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .label-tag { font-size: 0.7rem; color: var(--sub-text); margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        
        textarea { height: 120px; background: #000; border: 1px solid #222; border-radius: 4px; color: #fff; padding: 12px; font-size: 0.9rem; resize: none; outline: none; margin-bottom: 15px; font-family: sans-serif; }
        textarea:focus { border-color: var(--gold); }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .btn-exhibit { padding: 16px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        .btn-exhibit:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(175, 144, 66, 0.4); }
        
        .btn-sub-action { display: flex; gap: 6px; }
        .btn-sub-action button { flex: 1; padding: 10px; background: var(--btn-sub); border: 1px solid #222; color: #888; font-size: 0.75rem; cursor: pointer; transition: 0.2s; border-radius: 2px; }
        .btn-sub-action button:hover { background: #222; color: #fff; border-color: #444; }
        
        .btn-speed { padding: 6px !important; font-weight: bold; }
        .btn-speed.active { background: var(--gold) !important; color: #000 !important; border-color: var(--gold) !important; }

        #live-report { flex: 1; overflow-y: auto; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        .score-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dotted #1a1a1a; font-size: 0.75rem; transition: all 0.3s ease; }
        .chip { width: 4px; height: 10px; margin-right: 10px; }
        
        #gallery-main { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #111 0%, #000 100%); padding: 20px; min-height: 400px; }
        #masterpiece-wrap { position: relative; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0,0,0,1); border: 1px solid #1a1a1a; max-width: 100%; }
        canvas { image-rendering: pixelated; display: block; max-width: 100%; height: auto !important; }
        
        #side-exhibition { width: 300px; background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; flex-shrink: 0; }
        .cat-frame { width: 100%; border: 1px solid #222; padding: 5px; background: #000; box-shadow: 0 20px 50px rgba(0,0,0,1); }
        #cat-gif { width: 100%; display: block; }
        .exhibit-info { margin-top: 20px; color: #333; font-size: 0.7rem; text-align: center; letter-spacing: 2px; line-height: 1.5; }
        
        #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 360px; background: #fff; border-top: 8px solid var(--gold); padding: 30px; border-radius: 4px; box-shadow: 0 0 200px rgba(0,0,0,1); z-index: 100; color: #000; }
        .final-title { font-weight: 900; font-size: 1.4rem; text-align: center; margin-bottom: 20px; color: #000; }
        .rank-row { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        @media (max-width: 1024px) { #main-wrapper { flex-direction: column; } #docent-panel, #side-exhibition { width: 100%; } #gallery-main { padding: 40px 10px; } }
    </style>
</head>
<body>
    <div id="main-wrapper">
        <div id="docent-panel">
            <div class="gallery-title">아니 캔버스</div>
            <div class="label-tag">참가자 명단</div>
            <textarea id="nameInput" placeholder="이름 이름 이름..."></textarea>
            
            <div class="btn-group">
                <button class="btn-exhibit" onclick="initNewExhibition()">작품 생성 시작</button>
                <div class="btn-sub-action">
                    <button onclick="location.reload()">초기화</button>
                    <button onclick="location.href='index.html'">메인으로</button>
                </div>
            </div>

            <div class="label-tag">시뮬레이션 배속 (추천: 1.0x)</div>
            <div class="btn-sub-action" style="margin-bottom: 25px;">
                <button class="btn-speed" onclick="setSpeed(0.5, this)">0.5x</button>
                <button class="btn-speed active" onclick="setSpeed(1.0, this)">1.0x</button>
                <button class="btn-speed" onclick="setSpeed(2.0, this)">2.0x</button>
                <button class="btn-speed" onclick="setSpeed(5.0, this)">5.0x</button>
            </div>

            <div class="label-tag">실시간 점유 리포트</div>
            <div id="live-report"></div>
        </div>
        
        <div id="gallery-main">
            <div id="masterpiece-wrap">
                <canvas id="warCanvas"></canvas>
            </div>
            <div id="result-modal">
                <div class="final-title">최종 점유 순위</div>
                <div id="resultContent"></div>
                <button style="width:100%; margin-top:20px; padding:15px; background:#080808; color:#fff; border:none; font-weight:900; cursor:pointer;" onclick="document.getElementById('result-modal').style.display='none'">확인</button>
            </div>
        </div>
        
        <div id="side-exhibition">
            <div class="cat-frame"><img id="cat-gif" src="https://stimg.sooplive.com/NORMAL_BBS/6/7137696/999369af035d4f055.gif"></div>
            <div class="exhibit-info">특별 기획전 :<br>잠자는 임아니 (2026)</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('warCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const size = 100;
        let cell = 6;
        let grid = [], mask = [], teams = [], running = false, totalMaskPixels = 0;
        let animationId = null;
        let overtimeFrame = 0;
        let currentSpeed = 1.0; 

        const shapes = ['🐘', '🐈', '🐕', '🐇', '🦋', '🥒', '🦁', '🦉', '🐢', '🐬', '🐙', '🐴', '🐊', '🐯'];
        canvas.width = canvas.height = size * cell;

        function setSpeed(speed, btnElement) {
            currentSpeed = speed;
            document.querySelectorAll('.btn-speed').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function initNewExhibition() {
            const input = document.getElementById('nameInput').value.trim();
            if(!input) return alert("참가자 명단을 입력해 주세요.");
            
            running = false;
            overtimeFrame = 0;
            if(animationId) cancelAnimationFrame(animationId);
            document.getElementById('result-modal').style.display = 'none';

            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = tempCanvas.height = size;
            tempCtx.font = "80px serif"; tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
            tempCtx.fillText(shape, size/2, size/2);
            
            const data = tempCtx.getImageData(0, 0, size, size).data;
            mask = Array(size).fill().map(() => Array(size).fill(0));
            totalMaskPixels = 0;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (data[(y * size + x) * 4 + 3] > 50) { mask[x][y] = 1; totalMaskPixels++; }
                }
            }
            
            const names = input.split(/\s+/).filter(n => n.trim());
            teams = names.map((name, i) => ({
                name: name.trim(),
                color: `hsl(${(i * (360 / names.length)) % 360}, 85%, 60%)`,
                score: 0, share: 0, currentRank: 0, aliveCount: names.length
            }));
            
            grid = Array(size).fill().map(() => Array(size).fill(-1));
            
            // 초기 거점 하나씩 부여
            teams.forEach((_, idx) => {
                let found = false;
                while (!found) {
                    let rx = Math.floor(Math.random() * size), ry = Math.floor(Math.random() * size);
                    if (mask[rx][ry] === 1 && grid[rx][ry] === -1) { grid[rx][ry] = idx; found = true; }
                }
            });
            
            running = true;
            loop();
        }

        function loop() {
            if (!running) return;

            const baseAttempts = 500; 
            const attemptsPerFrame = Math.floor(baseAttempts * currentSpeed); 

            for (let i = 0; i < attemptsPerFrame; i++) {
                const rx = Math.floor(Math.random() * size);
                const ry = Math.floor(Math.random() * size);
                const attackerIdx = grid[rx][ry];

                if (attackerIdx === -1) continue;

                const attacker = teams[attackerIdx];
                const aliveCount = attacker.aliveCount || 1;
                
                // [등수 기반 계수 산출]
                // 1등은 0.0, 꼴찌는 1.0 (팀이 4개면 1등:0.0, 2등:0.33, 3등:0.66, 4등:1.0)
                const rankRatio = aliveCount > 1 ? (attacker.currentRank / (aliveCount - 1)) : 0;

                // [1. 행동력(턴) 보정]
                // 1등은 10% 확률로만 행동 (거의 멈춤), 꼴찌는 100% 확률로 행동 (폭주)
                let actionChance = 0.10 + (0.90 * rankRatio);
                
                // 단, 아직 맵이 많이 비어있는 초반(누구든 10% 미만 점유)엔 빠르게 채우게 함
                if (attacker.share < 0.1) actionChance = Math.max(actionChance, 0.8);

                if (Math.random() > actionChance) continue;

                // [2. 사거리 보정 (점프력)]
                // 1등은 1칸, 꼴찌는 최대 5칸까지 날아가서 꽂음
                let maxRange = 1 + Math.floor(4 * rankRatio); 

                const dist = Math.floor(Math.random() * maxRange) + 1;
                const dir = [[0,1],[0,-1],[1,0],[-1,0]];
                const [dx, dy] = dir[Math.floor(Math.random()*4)];
                
                const nx = rx + (dx * dist);
                const ny = ry + (dy * dist);
                
                if (nx >= 0 && nx < size && ny >= 0 && ny < size && mask[nx][ny] === 1) {
                    const targetIdx = grid[nx][ny];
                    
                    if (targetIdx !== attackerIdx) {
                        let captureChance = 1.0; 
                        
                        if (targetIdx !== -1) {
                            const target = teams[targetIdx];
                            const targetRankRatio = aliveCount > 1 ? (target.currentRank / (aliveCount - 1)) : 0;
                            
                            // [3. 공격/방어 확률 공식]
                            // 내 등수가 낮을수록(꼴찌일수록) 공격력 상승
                            // 상대 등수가 높을수록(1등일수록) 방어력 감소
                            captureChance = 0.3 + (rankRatio * 0.4) + ((1.0 - targetRankRatio) * 0.3);
                            
                            // 찐 꼴찌가 1등을 때릴 때는 무조건 100% 관통
                            if (attacker.currentRank === aliveCount - 1 && target.currentRank === 0) {
                                captureChance = 1.0;
                            }
                        }

                        if (Math.random() < captureChance) {
                            grid[nx][ny] = attackerIdx;

                            // [4. 폭발적 스플래시 데미지 (카오스의 핵심)]
                            // 하위권(rankRatio 0.5 이상)이 공격 성공 시 확률적으로 십자/광역 폭발
                            if (rankRatio > 0.5 && Math.random() < (0.1 + 0.3 * rankRatio)) {
                                // 꼴찌일수록 더 넓은 범위(2칸 반경) 폭발
                                const splashSize = Math.random() < rankRatio ? 2 : 1; 
                                
                                for(let sx = -splashSize; sx <= splashSize; sx++) {
                                    for(let sy = -splashSize; sy <= splashSize; sy++) {
                                        // 십자 모양을 넘어서 사각형 범위로 무작위 감염
                                        if(Math.abs(sx) + Math.abs(sy) > splashSize + 1) continue; 
                                        
                                        const tx = nx + sx, ty = ny + sy;
                                        if (tx >= 0 && tx < size && ty >= 0 && ty < size && mask[tx][ty] === 1) {
                                            // 70% 확률로 빈틈없이 파고듦
                                            if (Math.random() < 0.7) grid[tx][ty] = attackerIdx;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
            draw();
            updateLiveStatus();
            animationId = requestAnimationFrame(loop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    if (mask[x][y] === 1) {
                        ctx.fillStyle = grid[x][y] === -1 ? '#1a1a1a' : teams[grid[x][y]].color;
                        ctx.fillRect(x * cell, y * cell, cell - 1, cell - 1);
                    }
                }
            }
        }

        function updateLiveStatus() {
            const counts = Array(teams.length).fill(0);
            let occupied = 0;
            grid.forEach(row => row.forEach(val => { if(val !== -1) { counts[val]++; occupied++; } }));
            
            teams.forEach((t, i) => { 
                t.score = counts[i]; 
                t.share = t.score / totalMaskPixels; 
            });
            
            // [매 프레임마다 실시간 등수 업데이트]
            let aliveTeams = teams.filter(t => t.score > 0).sort((a,b) => b.score - a.score);
            aliveTeams.forEach((t, idx) => {
                // 원래 배열(teams)의 객체 속성을 업데이트
                const teamRef = teams.find(team => team.name === t.name);
                if (teamRef) {
                    teamRef.currentRank = idx;
                    teamRef.aliveCount = aliveTeams.length;
                }
            });

            const sorted = [...teams].sort((a,b) => b.score - a.score);
            
            document.getElementById('live-report').innerHTML = sorted.map(t => {
                // 순위 변동을 직관적으로 보여주기 위해 1등은 글씨를 키우고 반짝이게 함
                const isFirst = (t.currentRank === 0 && t.score > 0);
                const nameStyle = isFirst ? 'flex:1; color:#fff; font-weight:900; text-shadow: 0 0 5px var(--gold);' : 'flex:1; color:#777;';
                
                return `
                <div class="score-row">
                    <div class="chip" style="background:${t.color}"></div>
                    <span style="${nameStyle}">${t.name}</span>
                    <span style="font-weight:bold; color:var(--gold);">${(t.share * 100).toFixed(1)}%</span>
                </div>
            `}).join('');

            // 다 채워진 후에도 진흙탕 싸움을 위해 연장전 (배속 상관없이 약 5초 유지)
            if (occupied >= totalMaskPixels && running) {
                overtimeFrame++;
                // 한 명이 60% 이상 장악하거나, 연장전 시간이 다 되면 끝
                if (sorted[0].share >= 0.6 || overtimeFrame > (300 / currentSpeed)) {
                    running = false;
                    showFinal(sorted);
                }
            } else {
                overtimeFrame = 0;
            }
        }

        function showFinal(sorted) {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('resultContent');
            content.innerHTML = sorted.slice(0, 10).map((t, i) => `
                <div class="rank-row">
                    <span style="font-weight:900; color:var(--gold);">#${i+1}</span>
                    <span style="font-weight:bold;">${t.name}</span>
                    <span>${(t.share * 100).toFixed(1)}%</span>
                </div>
            `).join('');
            modal.style.display = 'block';
        }
        
        ctx.fillStyle = '#222'; ctx.textAlign = 'center'; ctx.font = '16px serif';
        ctx.fillText('시스템 대기 중...', canvas.width/2, canvas.height/2);
    </script>
</body>
</html>
