<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANI LAB - BATTLEGROUNDS Builder</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            --pubg-yellow: #f2a900;
            --pubg-dark: #0b0b0b;
            --pubg-gray: #2b2b2b;
            --pubg-white: #eeeeee;
            --caution-stripe: repeating-linear-gradient(45deg, #f2a900, #f2a900 10px, #000 10px, #000 20px);
        }

        /* 💥 효과 애니메이션 정의 */
        @keyframes pubg-shake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-2px, -2px); }
            30% { transform: translate(3px, 2px); }
            50% { transform: translate(-3px, 1px); }
            70% { transform: translate(2px, 1px); }
            90% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }

        @keyframes glitch-text {
            0% { transform: translateX(0); opacity: 1; }
            20% { transform: translateX(-3px); filter: hue-rotate(90deg); }
            40% { transform: translateX(3px); opacity: 0.7; }
            60% { transform: translateX(-3px); filter: hue-rotate(-90deg); }
            80% { transform: translateX(2px); opacity: 0.8; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .shake-active { animation: pubg-shake 0.3s ease-in-out; }
        .glitch-active { animation: glitch-text 0.3s infinite; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--pubg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px; color: var(--pubg-white);
        }

        .container {
            width: 100%; max-width: 600px;
            background: rgba(30, 30, 30, 0.95);
            border: 2px solid #444;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin: auto;
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            transition: transform 0.1s;
        }

        .caution-bar { height: 10px; background: var(--caution-stripe); width: 100%; }
        .content-padding { padding: 30px; }

        .top-visual { text-align: center; margin-bottom: 20px; }
        .game-logo-main { 
            width: 100%; max-height: 220px; border-radius: 4px; object-fit: cover; 
            border: 1px solid var(--pubg-yellow); filter: grayscale(20%) contrast(110%);
        }

        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        header h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        header h1 span { color: var(--pubg-yellow); }
        .slogan { font-size: 0.7rem; color: #888; letter-spacing: 4px; margin-top: 5px; }

        .team-labels { display: flex; justify-content: space-between; padding: 0 50px; margin-bottom: 15px; }
        .label { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; padding: 4px 12px; }
        .label.blue { background: #0047ab; color: white; }
        .label.red { background: #8b0000; color: white; }

        .lane-row { 
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px; 
            padding: 10px; background: rgba(0,0,0,0.4); 
            border: 1px solid #333; transition: 0.2s;
        }
        
        .lane-tag { 
            width: 60px; font-size: 0.75rem; font-weight: 900; color: #000; text-align: center; 
            background: var(--pubg-yellow); padding: 8px 0; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .player-input { 
            flex: 1; height: 45px; background: #1a1a1a; 
            border: 1px solid #444; color: #fff;
            padding: 0 12px; font-weight: 700; text-align: center; outline: none;
            transition: 0.1s;
        }
        .player-input:focus { border-color: var(--pubg-yellow); background: #222; }

        .lock-btn-pubg { 
            background-color: #333;
            background-image: url('https://i.namu.wiki/i/3OKUti7xu-1_eGueOMcp5TlbjdNNtZ6wvUSGJNEpVuL_1C2k85b6DWuK1M4NDqipXy0F8TyJ9jcWTCdhRrabwg.webp'); 
            background-size: 70%;
            background-position: center;
            background-repeat: no-repeat;
            border: 1px solid #555;
            height: 45px; width: 45px; cursor: pointer; flex-shrink: 0; 
            filter: grayscale(100%); opacity: 0.3; transition: 0.3s;
        }
        
        .lock-btn-pubg.active { 
            filter: grayscale(0%); opacity: 1;
            background-color: var(--pubg-yellow); border-color: #fff;
            box-shadow: 0 0 15px rgba(242, 169, 0, 0.4);
        }

        .lane-row.locked-row { border-color: var(--pubg-yellow); background: rgba(242, 169, 0, 0.05); }

        footer { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        
        .main-btn { 
            background: var(--pubg-yellow); color: #000; border: none; padding: 20px;
            font-weight: 900; cursor: pointer; font-size: 1.1rem; text-transform: uppercase;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:hover { background: #ffcc00; filter: brightness(1.1); }

        .footer-buttons { display: flex; gap: 8px; }
        .sub-btn { 
            flex: 1; background: #222; border: 1px solid #444; padding: 14px; 
            font-weight: 800; cursor: pointer; font-size: 0.85rem; color: #888;
            transition: 0.1s;
        }
        .sub-btn:active { transform: scale(0.95); }
        .highlight { border-color: var(--pubg-yellow); color: var(--pubg-yellow); }

        .home-btn-text { background: transparent; color: #555; border: none; cursor: pointer; font-weight: 700; margin: 20px auto; display: block; text-decoration: underline; }
        
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { width: 100%; clip-path: none; }
            .content-padding { padding: 15px 10px; }
            .team-labels { padding: 0 10px; justify-content: space-around; }
            .label { font-size: 0.8rem; padding: 4px 8px; }
            .lane-row { gap: 5px; padding: 8px 5px; }
            .lane-tag { width: 50px; font-size: 0.7rem; }
            .player-input { font-size: 0.9rem; padding: 0 5px; min-width: 0; }
            .lock-btn-pubg { width: 40px; height: 40px; }
            .main-btn { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="caution-bar"></div>
        <div class="content-padding">
            <div class="top-visual">
                <img src="https://stimg.sooplive.com/NORMAL_BBS/6/7137696/4745699a56be1861d.gif" class="game-logo-main">
            </div>

            <header>
                <h1><span>배그 킬내기</span> 팀짜기</h1>
                <div class="slogan">WINNER WINNER CHICKEN DINNER</div>
            </header>

            <div class="team-labels">
                <span class="label blue">SQUAD A</span>
                <span class="label red">SQUAD B</span>
            </div>

            <div id="builder-area">
                <div id="tier-rows"></div>
            </div>

            <footer>
                <button class="main-btn" id="shuffle-btn" onclick="shuffleWithEffect()">🪄 팀 재배치 (SHUFFLE)</button>
                <div class="footer-buttons">
                    <button class="sub-btn" onclick="resetInputs()">🔄 초기화</button>
                    <button class="sub-btn highlight" onclick="copyResult()">📋 결과 복사</button>
                </div>
            </footer>
            
            <button class="home-btn-text" onclick="location.href='team.html'">← 로비로 돌아가기</button>
        </div>
    </div>

    <script>
        let shuffleCount = 0;
        const tiers = ['1티어', '2티어', '3티어', '4티어'];

        window.onload = function() {
            const container = document.getElementById('tier-rows');
            container.innerHTML = tiers.map(tier => `
                <div class="lane-row">
                    <div class="lane-tag">${tier}</div>
                    <input type="text" class="player-input" placeholder="스쿼드 A">
                    <button class="lock-btn-pubg" onclick="toggleLock(this)"></button>
                    <input type="text" class="player-input" placeholder="스쿼드 B">
                </div>
            `).join('');
        };

        function toggleLock(btn) {
            btn.classList.toggle('active');
            const row = btn.parentElement;
            row.classList.toggle('locked-row');
        }

        // 💥 효과를 동반한 셔플 함수
        function shuffleWithEffect() {
            const container = document.getElementById('main-container');
            const inputs = document.querySelectorAll('.player-input:not([readonly])');
            const shuffleBtn = document.getElementById('shuffle-btn');

            // 1. 화면 진동 효과
            container.classList.add('shake-active');
            
            // 2. 잠기지 않은 입력창에 글리치 효과
            const rows = document.querySelectorAll('.lane-row');
            rows.forEach(row => {
                const lockBtn = row.querySelector('.lock-btn-pubg');
                if (!lockBtn.classList.contains('active')) {
                    row.querySelectorAll('.player-input').forEach(input => {
                        input.classList.add('glitch-active');
                    });
                }
            });

            // 3. 실제 셔플 로직 실행 (약간의 지연 후 텍스트 교체)
            setTimeout(() => {
                shuffleTeams();
                
                // 효과 제거
                container.classList.remove('shake-active');
                document.querySelectorAll('.glitch-active').forEach(el => {
                    el.classList.remove('glitch-active');
                });
            }, 300);
        }

        function shuffleTeams() {
            const rows = document.querySelectorAll('.lane-row');
            rows.forEach(row => {
                const lockBtn = row.querySelector('.lock-btn-pubg');
                if (!lockBtn.classList.contains('active')) {
                    const inputs = row.querySelectorAll('.player-input');
                    if (Math.random() > 0.5) {
                        const temp = inputs[0].value;
                        inputs[0].value = inputs[1].value;
                        inputs[1].value = temp;
                    }
                }
            });
            shuffleCount++;
            document.getElementById('shuffle-btn').innerText = `🪄 팀 재배치 (${shuffleCount}회)`;
        }

        function resetInputs() {
            document.querySelectorAll('.player-input').forEach(input => input.value = '');
            document.querySelectorAll('.lock-btn-pubg').forEach(btn => {
                btn.classList.remove('active');
                btn.parentElement.classList.remove('locked-row');
            });
            shuffleCount = 0;
            document.getElementById('shuffle-btn').innerText = `🪄 팀 재배치 (SHUFFLE)`;
        }

        function copyResult() {
            const rows = document.querySelectorAll('.lane-row');
            let text = `[킬내기 팀 결과]\n`;
            
            rows.forEach(row => {
                const tag = row.querySelector('.lane-tag').innerText;
                const inputs = row.querySelectorAll('.player-input');
                const p1 = inputs[0].value || '미배정';
                const p2 = inputs[1].value || '미배정';
                text += `[${tag}] ${p1} vs ${p2}\n`;
            });
            
            navigator.clipboard.writeText(text).then(() => {
                alert("전장 데이터가 복사되었습니다! 🍗");
            });
        }
    </script>
</body>
</html>
