<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI.LAB - 통합 관리 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #fff0f3; --accent: #ff007f; --sub: #ff85a1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); padding: 20px; }
        
        /* 🔒 로그인 섹션 */
        #auth-wrap { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #fff; padding: 40px; border-radius: 20px; border: 3px solid #ffe4e9; width: 320px; text-align: center; }
        .login-box h2 { color: var(--accent); margin-bottom: 25px; font-weight: 900; }
        
        /* 🛠 관리 섹션 (초기 숨김) */
        #admin-content { display: none; max-width: 900px; margin: 0 auto; }
        
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { text-decoration: none; padding: 12px; border-radius: 12px; font-size: 0.9rem; font-weight: 800; background: #fff; color: var(--accent); border: 2px solid var(--accent); flex: 1; text-align: center; transition: 0.3s; }
        .nav-btn:hover { background: var(--accent); color: #fff; }
        
        .tab-menu { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid #ffe4e9; cursor: pointer; font-weight: 800; background: #fff; color: var(--sub); }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .card { background: #fff; padding: 25px; border-radius: 20px; border: 3px solid #ffe4e9; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; font-weight: 800; color: var(--sub); }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 1rem; }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        .table th, .table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .action-btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: 800; font-size: 0.75rem; margin-right: 5px; }
        .edit-btn { background: #f0f0f0; color: #666; }
        .del-btn { background: #ffebeb; color: #ff4d4d; }
    </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="auth-wrap">
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <input type="email" id="email" placeholder="이메일" style="width:100%; margin-bottom:10px; padding:12px; border:2px solid #eee; border-radius:10px;">
        <input type="password" id="pw" placeholder="비밀번호" style="width:100%; margin-bottom:20px; padding:12px; border:2px solid #eee; border-radius:10px;">
        <button onclick="handleLogin()" class="submit-btn" style="margin:0;">매니저 인증</button>
    </div>
</div>

<!-- 관리 도구 컨텐츠 -->
<div id="admin-content">
    <div class="nav-bar">
        <a href="index.html" class="nav-btn">🏠 메인 화면</a>
        <a href="record.html" class="nav-btn">📊 전적 센터</a>
        <button onclick="handleLogout()" class="nav-btn" style="border-color:#ff4d4d; color:#ff4d4d;">🔒 로그아웃</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="ck-tab" onclick="switchTab('ck')">🏆 CK</button>
        <button class="tab-btn" id="land-tab" onclick="switchTab('land')">🏰 랜드</button>
        <button class="tab-btn" id="solo-tab" onclick="switchTab('solo')">🔥 솔랭내기</button>
    </div>

    <div class="card">
        <h2 id="form-title" style="color:var(--accent); margin-bottom:15px;">전적 입력</h2>
        <form id="main-form">
            <input type="hidden" id="edit-id"> <div id="form-fields" class="grid"></div>
            <button type="submit" id="submit-btn" class="submit-btn">데이터 저장하기</button>
            <button type="button" id="cancel-btn" class="submit-btn" style="background:#aaa; display:none;" onclick="location.reload()">수정 취소</button>
        </form>
    </div>

    <div class="card">
        <h3 style="color:var(--sub); margin-bottom:10px;">데이터 관리</h3>
        <div style="overflow-x:auto;">
            <table class="table">
                <thead><tr><th>날짜</th><th>내용</th><th>결과</th><th>관리</th></tr></thead>
                <tbody id="manage-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ilwpkjdwizzjmcmfmvig.supabase.co', 'sb_publishable_2IN7qgG_rvB6kcggisbmxA_XqInFAgy');
    let mode = 'ck';

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pw').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert("인증 실패: " + error.message);
        else checkAuth();
    }

    async function checkAuth() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-wrap').style.display = "none";
            document.getElementById('admin-content').style.display = "block";
            switchTab('ck');
        }
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    function switchTab(t) {
        mode = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t+'-tab').classList.add('active');
        document.getElementById('edit-id').value = "";
        renderFields(); fetchList();
    }

    function renderFields() {
        const container = document.getElementById('form-fields');
        let html = `<div class="box"><label>날짜 (시작일)</label><input type="date" id="f-date"></div>`;
        if(mode === 'solo') html += `<div class="box"><label>종료 날짜 (장기 내기용)</label><input type="date" id="f-end-date"></div>`;
        html += `<div class="box"><label>제목/대회명</label><input type="text" id="f-title"></div>
                 <div class="box"><label>결과</label><select id="f-result"><option value="승">WIN</option><option value="패">LOSE</option></select></div>
                 <div class="box"><label>스코어</label><input type="text" id="f-score" placeholder="3:2"></div>`;
        
        if(mode !== 'solo') {
            html += `<div class="box"><label>포지션</label><select id="f-pos"><option>TOP</option><option>JGL</option><option>MID</option><option selected>AD</option><option>SUP</option></select></div>
                     <div class="box"><label>상대방</label><input type="text" id="f-opp"></div>`;
        } else {
            html += `<div class="box"><label>계정</label><input type="text" id="f-acc"></div>
                     <div class="box"><label>인원수</label><input type="number" id="f-play" value="1"></div>`;
        }

        if(mode === 'land') html += `<div class="box" style="grid-column:span 2;"><label>사비빵 액수(개)</label><input type="number" id="f-sabi"></div>`;
        else html += `<div class="box" style="grid-column:span 2;"><label>펀딩 총액(개)</label><input type="number" id="f-fund"></div>`;
        
        html += `<div class="box" style="grid-column:span 2;"><label>라인업 (상대vs우리, ...)</label><input type="text" id="f-mem"></div>
                 <div class="box" style="grid-column:span 2;"><label>메모</label><input type="text" id="f-memo"></div>`;
        container.innerHTML = html;
    }

    async function fetchList() {
        const table = mode==='ck'?'records':(mode==='land'?'land_records':'solo_records');
        const { data } = await _supabase.from(table).select('*').order('date', { ascending: false });
        const list = document.getElementById('manage-list'); list.innerHTML = '';
        data?.forEach(i => {
            list.innerHTML += `<tr><td>${i.date}</td><td>${i.title}</td><td>${i.result}</td><td>
                <button class="action-btn edit-btn" onclick="editMode('${i.id}')">수정</button>
                <button class="action-btn del-btn" onclick="delData('${i.id}')">삭제</button>
            </td></tr>`;
        });
    }

    async function editMode(id) {
        const table = mode==='ck'?'records':(mode==='land'?'land_records':'solo_records');
        const { data } = await _supabase.from(table).select('*').eq('id', id).single();
        
        document.getElementById('edit-id').value = id;
        document.getElementById('f-date').value = data.date;
        document.getElementById('f-title').value = data.title;
        document.getElementById('f-result').value = data.result;
        document.getElementById('f-score').value = data.score;
        document.getElementById('f-mem').value = data.members;
        document.getElementById('f-memo').value = data.memo;

        if(mode === 'solo') {
            document.getElementById('f-end-date').value = data.end_date || "";
            document.getElementById('f-acc').value = data.account;
            document.getElementById('f-play').value = data.players;
            document.getElementById('f-fund').value = data.funding;
        } else if(mode === 'land') {
            document.getElementById('f-pos').value = data.position;
            document.getElementById('f-opp').value = data.opponent;
            document.getElementById('f-sabi').value = data.sabi;
        } else {
            document.getElementById('f-pos').value = data.position;
            document.getElementById('f-opp').value = data.opponent;
            document.getElementById('f-fund').value = data.funding;
        }

        document.getElementById('form-title').innerText = "데이터 수정 중...";
        document.getElementById('submit-btn').innerText = "수정 완료하기";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function delData(id) {
        if(confirm("진짜 삭제하시겠습니까?")) {
            const table = mode==='ck'?'records':(mode==='land'?'land_records':'solo_records');
            await _supabase.from(table).delete().eq('id', id); fetchList();
        }
    }

    document.getElementById('main-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const table = mode==='ck'?'records':(mode==='land'?'land_records':'solo_records');
        
        const payload = {
            date: document.getElementById('f-date').value,
            title: document.getElementById('f-title').value,
            result: document.getElementById('f-result').value,
            score: document.getElementById('f-score').value,
            members: document.getElementById('f-mem').value,
            memo: document.getElementById('f-memo').value
        };

        if(mode === 'solo') {
            payload.end_date = document.getElementById('f-end-date').value;
            payload.account = document.getElementById('f-acc').value;
            payload.players = parseInt(document.getElementById('f-play').value);
            payload.funding = parseInt(document.getElementById('f-fund').value);
        } else if(mode === 'land') {
            payload.position = document.getElementById('f-pos').value;
            payload.opponent = document.getElementById('f-opp').value;
            payload.sabi = parseInt(document.getElementById('f-sabi').value);
        } else {
            payload.position = document.getElementById('f-pos').value;
            payload.opponent = document.getElementById('f-opp').value;
            payload.funding = parseInt(document.getElementById('f-fund').value);
            payload.players = 5;
        }

        if(id) {
            await _supabase.from(table).update(payload).eq('id', id);
            alert("수정되었습니다.");
        } else {
            await _supabase.from(table).insert([payload]);
            alert("저장되었습니다.");
        }
        location.reload();
    });

    window.onload = checkAuth;
</script>
</body>
</html>
