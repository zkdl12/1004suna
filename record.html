<!DOCTYPE html>
<html lang="ko">
<head>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANI.LAB - 전적 데이터 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #000; --card: #0a0a0a; --t1-red: #E4002B; --t1-gold: #C29E5E; --win: #00ffa3; --lose: #ff4d4d; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #300008 0%, transparent 50%); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px 10px; text-align: center; }
        
        .top-nav { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        .home-btn { text-decoration: none; color: #fff; font-weight: 800; font-size: 0.8rem; border: 1px solid var(--t1-red); padding: 8px 15px; border-radius: 4px; background: rgba(228, 0, 43, 0.1); transition: 0.3s; }
        .home-btn:hover { background: var(--t1-red); }

        .view-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .v-tab { background: transparent; border: 1px solid var(--t1-red); color: #fff; padding: 12px; cursor: pointer; font-weight: 800; border-radius: 4px; flex: 1; max-width: 150px; font-size: 0.9rem; transition: 0.3s; }
        .v-tab.active { background: var(--t1-red); box-shadow: 0 0 15px var(--t1-red); }
        .top-visual img { width: 100%; max-width: 280px; border-radius: 10px; border: 2px solid var(--t1-red); margin-bottom: 15px; box-shadow: 0 0 30px rgba(228, 0, 43, 0.4); }
        #win-rate-banner { color: var(--t1-gold); font-weight: 900; margin-bottom: 15px; font-size: 1.1rem; }
        .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow-x: auto; position: relative; margin-bottom: 50px; }
        .table-wrapper::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--t1-red); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #111; color: var(--t1-gold); padding: 15px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
        td { padding: 18px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .status-win { color: var(--win); font-weight: 900; font-size: 1.1rem; }
        .status-lose { color: var(--lose); font-weight: 900; font-size: 1.1rem; }
        .score-tag { display: block; font-size: 0.8rem; color: var(--t1-gold); margin-top: 4px; font-weight: 700; }
        .pos-text { color: var(--t1-red); font-weight: 900; font-size: 1rem; letter-spacing: 1px; }
        .btn-link { background: transparent; border: 1px solid #444; color: #fff; padding: 5px 10px; cursor: pointer; font-size: 0.85rem; text-decoration: none; border-radius: 3px; font-weight: 700; }
        .btn-link:hover { border-color: var(--t1-red); color: var(--t1-red); background: rgba(228, 0, 43, 0.1); }
        .sub-btn-group { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
        .sub-btn { font-size: 0.75rem; background: none; border: 1px solid #444; padding: 3px 8px; cursor: pointer; font-weight: 700; color: #888; border-radius: 2px; }
        .sub-btn.gold { color: var(--t1-gold); border-color: var(--t1-gold); }
        .sub-btn.red { color: var(--t1-red); border-color: var(--t1-red); }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; margin: 10% auto; padding: 40px 20px; border: 1px solid var(--t1-red); width: 90%; max-width: 450px; border-radius: 4px; position: relative; text-align: center; box-shadow: 0 0 40px rgba(228, 0, 43, 0.4); }
        .matchup-list { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .matchup-row { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; background: #111; padding: 20px 10px; border-left: 4px solid var(--t1-red); position: relative; width: 100%; }
        .pos-label { position: absolute; left: 50%; transform: translateX(-50%); top: -8px; font-size: 10px; color: var(--t1-gold); font-weight: 900; background: #0a0a0a; padding: 0 6px; border: 1px solid #222; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #666; cursor: pointer; font-size: 1.8rem; }
        
        /* 새로 추가: 마우스 오버 시 색상 변화로 클릭 가능함 강조 */
        .month-header:hover { background: rgba(228, 0, 43, 0.25) !important; }
    </style>
</head>
<body>
        <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WLFLL6GS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
        <div class="top-nav"><a href="index.html" class="home-btn">← 메인 화면</a></div>
        <div class="view-tabs">
            <button class="v-tab active" id="tab-ck" onclick="switchView('ck')">🏆 CK 전적</button>
            <button class="v-tab" id="tab-land" onclick="switchView('land')">🏰 랜드 전적</button>
            <button class="v-tab" id="tab-solo" onclick="switchView('solo')">🔥 솔랭내기</button>
        </div>
        <div class="top-visual"><img src="https://stimg.sooplive.com/NORMAL_BBS/6/7137696/742869b7deaa2ed62.gif"></div>
        <div id="win-rate-banner">데이터 불러오는 중...</div>
        <div class="table-wrapper">
            <table>
                <thead id="table-head"></thead>
                <tbody id="record-list"></tbody>
            </table>
        </div>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalTitle" style="color:var(--t1-gold); margin-bottom:20px; font-weight:900;">정보</div>
            <div id="modalList" class="matchup-list"></div>
            <div id="modalDesc" style="display:none; color:#fff; font-weight:700; line-height:1.6;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ilwpkjdwizzjmcmfmvig.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2IN7qgG_rvB6kcggisbmxA_XqInFAgy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentType = 'ck'; 
        let allData = [];

        async function switchView(type) {
            currentType = type;
            document.querySelectorAll('.v-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            loadData();
        }

        async function loadData() {
            const list = document.getElementById('record-list');
            const head = document.getElementById('table-head');
            list.innerHTML = '<tr><td colspan="6" style="padding:40px;">데이터 로딩 중...</td></tr>';

            let dbTable = '';
            if(currentType === 'ck') {
                dbTable = 'records';
                head.innerHTML = `<tr><th width="12%">날짜</th><th width="12%">결과</th><th width="10%">포지션</th><th width="23%">CK명</th><th width="13%">상대</th><th width="30%">펀딩(인당)</th></tr>`;
            } else if(currentType === 'land') {
                dbTable = 'land_records';
                head.innerHTML = `<tr><th width="12%">날짜</th><th width="12%">결과</th><th width="10%">포지션</th><th width="23%">랜드정보</th><th width="13%">상대</th><th width="30%">사비빵</th></tr>`;
            } else {
                dbTable = 'solo_records';
                head.innerHTML = `<tr><th width="15%">날짜</th><th width="15%">결과</th><th width="30%">솔랭내기</th><th width="15%">계정</th><th width="25%">펀딩(인당)</th></tr>`;
            }

            try {
                const { data, error } = await _supabase.from(dbTable).select('*').order('date', { ascending: false });
                if (error) throw error;
                allData = data || [];
                renderTable(allData);
            } catch (err) {
                console.error("Fetch Error:", err);
                list.innerHTML = `<tr><td colspan="6" style="padding:40px; color:#ff4d4d;">데이터를 불러오지 못했습니다.</td></tr>`;
            }
        }

        function renderTable(data) {
            const list = document.getElementById('record-list'); 
            list.innerHTML = '';
            
            if (!data || data.length === 0) {
                list.innerHTML = '<tr><td colspan="6" style="padding:40px;">등록된 데이터가 없습니다.</td></tr>';
                document.getElementById('win-rate-banner').innerText = "전적 데이터 없음";
                return;
            }

            const totalWins = data.filter(i => (i.result || '').includes('승') || String(i.result).toUpperCase().includes('WIN')).length;
            const totalRate = Math.round((totalWins / data.length) * 100);
            const label = currentType === 'ck' ? 'CK' : (currentType === 'land' ? '랜드' : '솔랭내기');
            document.getElementById('win-rate-banner').innerText = `통산 ${label} 승률: ${totalRate}% (${totalWins}승 ${data.length-totalWins}패)`;

            const groupedData = {};
            data.forEach(item => {
                const month = item.date ? item.date.substring(0, 7) : '날짜없음';
                if (!groupedData[month]) groupedData[month] = [];
                groupedData[month].push(item);
            });

            const sortedMonths = Object.keys(groupedData).sort((a, b) => b.localeCompare(a));

            sortedMonths.forEach((month, index) => {
                const monthMatches = groupedData[month];
                const monthWins = monthMatches.filter(i => (i.result || '').includes('승') || String(i.result).toUpperCase().includes('WIN')).length;
                const monthRate = Math.round((monthWins / monthMatches.length) * 100);

                // 첫 번째 월(가장 최근)만 기본으로 열어두고(display ""), 나머지는 숨김(display "none")
                const isLatest = index === 0;
                const displayStyle = isLatest ? "" : "display: none;";
                const icon = isLatest ? "▼" : "▶";

                // 헤더 클릭 시 toggleMonth 실행
                list.innerHTML += `
                    <tr class="month-header" style="background: rgba(228, 0, 43, 0.1); border-top: 2px solid var(--t1-red); cursor: pointer; transition: 0.2s;" onclick="toggleMonth('${month}')">
                        <td colspan="6" style="padding: 12px; text-align: left; font-weight: 900; color: #fff; font-size: 0.9rem;">
                            <span id="icon-${month}" style="display:inline-block; width:15px; color:var(--t1-gold);">${icon}</span> 
                            📅 ${month} 전적 
                            <span style="color:var(--t1-gold); margin-left: 10px; font-weight: 700;">(월 승률: ${monthRate}% | ${monthWins}승 ${monthMatches.length - monthWins}패)</span>
                        </td>
                    </tr>
                `;

                // 해당 월의 경기 목록 나열 (클래스 부여하여 토글 대상 지정)
                monthMatches.forEach(item => {
                    const resText = item.result || '';
                    const isWin = resText.includes('승') || String(resText).toUpperCase().includes('WIN');
                    let dateDisplay = item.date || '-';
                    
                    if(currentType === 'solo' && item.end_date) {
                        dateDisplay = `${item.date}<br><span style="font-size:0.65rem; color:#666;">~${item.end_date}</span>`;
                    }

                    let btns = `<div class="sub-btn-group"><button class="sub-btn gold" onclick="openMatchup('${item.members}', ${currentType !== 'solo'})">라인업</button>`;
                    if(item.memo) btns += `<button class="sub-btn red" onclick="openMemo(\`${item.memo}\`)">메모</button>`;
                    btns += `</div>`;

                    let row = `<tr class="match-row-${month}" style="${displayStyle}">
                        <td style="color:#555; font-size:0.75rem;">${dateDisplay}</td>
                        <td><span class="${isWin?'status-win':'status-lose'}">${isWin?'WIN':'LOSE'}</span><span class="score-tag">${item.score || '0:0'}</span></td>`;
                    
                    if(currentType !== 'solo') {
                        row += `<td class="pos-text">${item.position || '-'}</td>`;
                    }

                    row += `<td style="font-weight:800;">${item.title || '제목없음'}${btns}</td>
                        <td>${currentType === 'solo' ? `<a href="https://www.fow.lol/find/kr/${(item.account || '').replace('#','-')}" target="_blank" class="btn-link">${item.account || '전적'}</a>` : `<button class="btn-link" onclick="showOppRate('${item.opponent}')">${item.opponent || '-'}</button>`}</td>`;
                    
                    if(currentType === 'land') {
                        row += `<td style="font-weight:800;">${(item.sabi || 0).toLocaleString()}개</td>`;
                    } else {
                        const funding = Number(item.funding || 0);
                        const players = currentType === 'ck' ? 5 : (item.players || 1);
                        row += `<td style="font-weight:800;">${funding.toLocaleString()}개<br><span style="color:var(--t1-gold); font-size:0.75rem;">인당: ${Math.floor(funding/players).toLocaleString()}개</span></td>`;
                    }
                    list.innerHTML += row + `</tr>`;
                });
            });
        }

        // 새로 추가: 월별 전적 숨기기/보이기 기능
        function toggleMonth(month) {
            const rows = document.querySelectorAll(`.match-row-${month}`);
            const iconEl = document.getElementById(`icon-${month}`);
            
            // 현재 숨겨져 있는지 첫 번째 줄의 상태로 확인
            if (rows.length === 0) return;
            const isCurrentlyHidden = rows[0].style.display === 'none';

            rows.forEach(row => {
                row.style.display = isCurrentlyHidden ? '' : 'none';
            });

            // 화살표 방향 변경
            if (iconEl) {
                iconEl.innerText = isCurrentlyHidden ? '▼' : '▶';
            }
        }

        function openMatchup(members, hasLabel) {
            const modalList = document.getElementById('modalList'); 
            const modalDesc = document.getElementById('modalDesc');
            modalList.innerHTML = ""; 
            modalList.style.display = "flex"; 
            modalDesc.style.display = "none";
            document.getElementById('modalTitle').innerText = "라인업 매치업";
            
            if(!members || members === 'null' || members === 'undefined') {
                modalList.innerHTML = "<div style='color:#666; padding:20px;'>등록된 라인업 정보가 없습니다.</div>";
            } else {
                const positions = ['TOP', 'JGL', 'MID', 'AD', 'SUP', '6TH'];
                members.split(',').forEach((pair, index) => {
                    const [a, b] = pair.split('vs');
                    modalList.innerHTML += `<div class="matchup-row">${(hasLabel && positions[index])?`<div class="pos-label">${positions[index]}</div>`:''}<div class="team-text" style="text-align:right; font-weight:700;">${a||'-'}</div><div class="vs-text" style="color:var(--t1-red); font-size:0.7rem; font-weight:900;">VS</div><div class="team-text" style="text-align:left; font-weight:700;">${b||'-'}</div></div>`;
                });
            }
            document.getElementById('customModal').style.display = "block";
        }

        function showOppRate(opp) {
            const matches = allData.filter(i => i.opponent === opp);
            const wins = matches.filter(i => (i.result || '').includes('승') || String(i.result).toUpperCase().includes('WIN')).length;
            const rate = matches.length > 0 ? Math.round((wins / matches.length) * 100) : 0;
            openMemo(`<span style="color:var(--t1-gold); font-size:1.4rem;">${opp}</span> 상대 통산 승률<br><br><span style='font-size:2rem; color:var(--win);'>${rate}%</span><br>(${wins}승 ${matches.length-wins}패)`);
            document.getElementById('modalTitle').innerText = "상대 전적 통계";
        }

        function openMemo(memo) {
            document.getElementById('modalList').style.display = "none";
            const desc = document.getElementById('modalDesc');
            desc.innerHTML = memo; 
            desc.style.display = "block";
            document.getElementById('modalTitle').innerText = "상세 정보";
            document.getElementById('customModal').style.display = "block";
        }

        function closeModal() { document.getElementById('customModal').style.display = "none"; }
        window.onclick = (e) => { if(e.target == document.getElementById('customModal')) closeModal(); }
        window.onload = loadData;
    </script>
</body>
</html>
