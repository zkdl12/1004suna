<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI.LAB - T1 데이터 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --t1-red: #E4002B; 
            --t1-gold: #C29E5E; 
            --win: #00ffa3; 
            --lose: #ff4d4d; 
            --border: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Pretendard', sans-serif; 
            overflow-x: hidden;
        }

        /* T1 레드 그라데이션 배경 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #300008 0%, transparent 50%);
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .home-btn { 
            text-decoration: none; color: #fff; font-weight: 900; font-size: 0.8rem;
            border: 1px solid var(--t1-red); padding: 8px 16px; border-radius: 4px;
            background: rgba(228, 0, 43, 0.1); transition: 0.3s;
        }
        .home-btn:hover { background: var(--t1-red); box-shadow: 0 0 15px var(--t1-red); }

        .top-visual img { 
            max-width: 200px; border-radius: 10px; border: 1px solid var(--t1-red); 
            box-shadow: 0 0 30px rgba(228, 0, 43, 0.2); 
        }
        
        .table-wrapper { 
            background: var(--card); border: 1px solid var(--border); border-radius: 4px; 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
            margin-top: 20px;
        }
        .table-wrapper::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--t1-red); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #111; color: var(--t1-gold); padding: 18px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
        td { padding: 20px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 0.95rem; }

        .status-win { color: var(--win); font-weight: 900; }
        .status-lose { color: var(--lose); font-weight: 900; }
        .score-tag { display: block; font-size: 0.8rem; color: var(--t1-gold); margin-top: 4px; font-family: 'monospace'; }
        
        .btn-action { 
            background: transparent; border: 1px solid #333; color: #fff; 
            padding: 6px 12px; border-radius: 2px; cursor: pointer; 
            font-size: 0.8rem; transition: 0.3s;
        }
        .btn-action:hover { border-color: var(--t1-red); color: var(--t1-red); }

        .memo-btn { 
            margin-top: 8px; font-size: 0.7rem; color: var(--t1-red); 
            background: none; border: 1px solid var(--t1-red); padding: 2px 8px;
            cursor: pointer; font-weight: 800;
        }

        /* 👑 T1 스타일 커스텀 모달 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { 
            background: #0f0f0f; margin: 15% auto; padding: 40px; 
            border: 1px solid var(--t1-red); width: 380px; border-radius: 4px; 
            position: relative; text-align: center;
            box-shadow: 0 0 50px rgba(228, 0, 43, 0.3);
        }
        .modal-content::before {
            content: ""; position: absolute; top: -1px; left: -1px; width: 30px; height: 30px;
            border-top: 3px solid var(--t1-red); border-left: 3px solid var(--t1-red);
        }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #555; cursor: pointer; font-size: 1.5rem; }
        .modal-title { color: var(--t1-gold); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 25px; font-weight: 800; }
        .modal-body { font-size: 2.8rem; font-weight: 900; color: #fff; }
        .modal-desc { font-size: 1.2rem; color: #fff; margin-top: 5px; line-height: 1.4; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="home-btn">← 메인으로</a>
            <div style="color:var(--t1-gold); font-weight:900; letter-spacing:2px;">T1 데이터 센터</div>
        </div>

        <div class="top-visual"><img src="https://stimg.sooplive.com/NORMAL_BBS/6/7137696/323469ee79e6806dd.gif"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th width="15%">날짜</th>
                        <th width="15%">결과</th>
                        <th width="25%">대회 정보</th>
                        <th width="15%">상대</th>
                        <th width="30%">펀딩 현황</th>
                    </tr>
                </thead>
                <tbody id="record-list"></tbody>
            </table>
        </div>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalTitle" class="modal-title">정보</div>
            <div id="modalBody" class="modal-body"></div>
            <div id="modalDesc" class="modal-desc"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ilwpkjdwizzjmcmfmvig.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2IN7qgG_rvB6kcggisbmxA_XqInFAgy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allData = [];

        async function loadRecords() {
            const { data } = await _supabase.from('records').select('*').order('date', { ascending: false });
            allData = data || [];
            const list = document.getElementById('record-list');
            list.innerHTML = '';

            allData.forEach(item => {
                const isWin = item.result.includes('승');
                const funding = Number(item.funding || 0);
                const memoBtn = item.memo ? `<br><button class="memo-btn" onclick="openMemo('${item.memo}')">특이사항 보기</button>` : '';
                
                list.innerHTML += `
                    <tr>
                        <td style="color:#555; font-family:monospace; font-size:0.8rem;">${item.date}</td>
                        <td>
                            <span class="${isWin?'status-win':'status-lose'}">${isWin?'WIN':'LOSE'}</span>
                            <span class="score-tag">${item.score || '0:0'}</span>
                        </td>
                        <td style="font-weight:800;">${item.title}${memoBtn}</td>
                        <td>
                            <button class="btn-action" onclick="showWinRate('${item.opponent}')">${item.opponent}</button>
                        </td>
                        <td style="font-weight:800;">
                            <span style="font-size:1.1rem; color:#fff;">${funding.toLocaleString()}</span><span style="font-size:0.8rem; color:#666;">개</span><br>
                            <span style="color:var(--t1-gold); font-size:0.75rem;">각방: ${Math.floor(funding/5).toLocaleString()}개</span>
                        </td>
                    </tr>
                `;
            });
        }

        function openMemo(memoText) {
            document.getElementById('modalTitle').innerText = "경기 특이사항";
            document.getElementById('modalBody').style.display = "none"; // '메모' 글자 자리 숨김
            const desc = document.getElementById('modalDesc');
            desc.innerText = memoText;
            desc.style.fontSize = "1.8rem"; // 내용 강조
            document.getElementById('customModal').style.display = "block";
        }

        function showWinRate(opp) {
            const matches = allData.filter(i => i.opponent === opp);
            const wins = matches.filter(i => i.result.includes('승')).length;
            const rate = matches.length > 0 ? Math.round((wins / matches.length) * 100) : 0;
            
            document.getElementById('modalTitle').innerText = `${opp}님 상대 승률`;
            const body = document.getElementById('modalBody');
            body.innerText = `${rate}%`;
            body.style.display = "block";
            
            const desc = document.getElementById('modalDesc');
            desc.innerText = `총 ${matches.length}전 ${wins}승 ${matches.length - wins}패`;
            desc.style.fontSize = "1.1rem";
            document.getElementById('customModal').style.display = "block";
        }

        function closeModal() { document.getElementById('customModal').style.display = "none"; }
        window.onclick = (e) => { if(e.target == document.getElementById('customModal')) closeModal(); }
        window.onload = loadRecords;
    </script>
</body>
</html>
